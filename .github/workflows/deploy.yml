name: Deploy GoClaw to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 2018
          password: ${{ secrets.VPS_PASSWORD }}
          source: "."
          target: "/opt/agent-chatbot"

      - name: Execute Deployment Commands on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 2018
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            export DEBIAN_FRONTEND=noninteractive
            cd /opt/agent-chatbot
            
            # Khởi tạo quyền thực thi và tạo file biến môi trường gốc của goclaw
            chmod +x prepare-env.sh
            ./prepare-env.sh || true
            
            # Bind port vào localhost (127.0.0.1) trên VPS thay cho global access giúp Nginx kiểm soát toàn diện HTTPs
            export GOCLAW_HOST=127.0.0.1
            export GOCLAW_PORT=18790
            
            # Start/Update App docker orchestration
            make up
